services:
  - type: web
    name: job-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_GEMINI
        value: "true"
      - key: GEMINI_MODEL_NAME
        value: gemini-3.1-flash-lite
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_TRACING_API_KEY
        sync: false
